name: Process Mod Issue

on:
  issues:
    types: [opened]
  pull_request:
    types: [closed]
    paths:
      - "scripts/update-mod-source-data/config.yaml"

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write
  pages: write
  id-token: write

jobs:
  # ── Triggered by issue open ──────────────────────────────
  handle-issue:
    name: Handle mod issue
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'issues' && (
        contains(github.event.issue.labels.*.name, 'mod-submission') ||
        contains(github.event.issue.labels.*.name, 'update-source')
      )
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Process issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);

            // ── Route: update-source ──
            if (labels.includes("update-source")) {
              await github.rest.actions.createWorkflowDispatch({
                ...context.repo,
                workflow_id: "update-mod-source.yaml",
                ref: "main"
              });

              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body: "Mod source update triggered! The [Update Mod Source](https://github.com/" +
                  context.repo.owner + "/" + context.repo.repo +
                  "/actions/workflows/update-mod-source.yaml) workflow is now running.\n\n" +
                  "This usually takes a few minutes. The site will redeploy automatically when it finishes."
              });

              await github.rest.issues.update({
                ...context.repo,
                issue_number: issue.number,
                state: "closed",
                state_reason: "completed"
              });
              return;
            }

            // ── Route: mod-submission ──
            const body = issue.body || "";
            const title = issue.title || "";

            const yamlMatch = body.match(/```yaml\n([\s\S]*?)```/);
            if (!yamlMatch) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body: "Could not find a YAML code block in this issue. Please use the [submit form](https://jakmods.dev/submit.html) to generate the correct format."
              });
              return;
            }
            const yamlBlock = yamlMatch[1];

            const modIdMatch = yamlBlock.match(/^\s{2}([a-z0-9][a-z0-9\-]*[a-z0-9]):\s*$/m);
            if (!modIdMatch) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body: "Could not parse a valid mod ID from the YAML block. The entry should start with a 2-space indented kebab-case key like `  my-mod:`."
              });
              return;
            }
            const modId = modIdMatch[1];

            const isUpdate = title.toLowerCase().startsWith("update mod:");

            // Read current config.yaml
            const configPath = "scripts/update-mod-source-data/config.yaml";
            const { data: fileData } = await github.rest.repos.getContent({
              ...context.repo,
              path: configPath,
              ref: "main"
            });
            const currentContent = Buffer.from(fileData.content, "base64").toString("utf8");

            // Build new config content
            let newContent;
            if (isUpdate) {
              const needle = `\n  ${modId}:\n`;
              const idx = currentContent.indexOf(needle);
              if (idx === -1) {
                await github.rest.issues.createComment({
                  ...context.repo,
                  issue_number: issue.number,
                  body: `Could not find existing mod \`${modId}\` in config.yaml. If this is a new mod, change the issue title to start with "Add mod:".`
                });
                return;
              }
              const blockStart = idx + 1;

              let blockEnd = blockStart + needle.length - 1;
              const rest = currentContent.substring(blockEnd).split("\n");
              for (const line of rest) {
                if (line === "" || /^    /.test(line) || /^  #/.test(line)) {
                  blockEnd += line.length + 1;
                } else {
                  break;
                }
              }

              newContent = currentContent.substring(0, blockStart) + yamlBlock + currentContent.substring(blockEnd);
            } else {
              if (currentContent.includes(`\n  ${modId}:\n`)) {
                await github.rest.issues.createComment({
                  ...context.repo,
                  issue_number: issue.number,
                  body: `Mod ID \`${modId}\` already exists in config.yaml. If you want to update it, change the issue title to start with "Update mod:".`
                });
                return;
              }

              const texIdx = currentContent.indexOf("\ntexture_packs:");
              if (texIdx !== -1) {
                newContent = currentContent.substring(0, texIdx) + "\n" + yamlBlock + currentContent.substring(texIdx);
              } else {
                newContent = currentContent + "\n" + yamlBlock;
              }
            }

            // Create branch for config PR
            const action = isUpdate ? "update" : "add";
            const branchName = `${action}-mod-${modId}-${Date.now()}`;

            const { data: mainRef } = await github.rest.git.getRef({
              ...context.repo,
              ref: "heads/main"
            });

            await github.rest.git.createRef({
              ...context.repo,
              ref: `refs/heads/${branchName}`,
              sha: mainRef.object.sha
            });

            const displayName = title.replace(/^(add|update)\s+mod:\s*/i, "").trim();
            const commitMessage = isUpdate
              ? `Update mod: ${displayName}`
              : `Add mod: ${displayName}`;

            await github.rest.repos.createOrUpdateFileContents({
              ...context.repo,
              path: configPath,
              message: commitMessage,
              content: Buffer.from(newContent).toString("base64"),
              sha: fileData.sha,
              branch: branchName
            });

            // Create PR
            const prBody = `${isUpdate ? "Updates" : "Adds"} the **${displayName}** mod entry in \`config.yaml\`.\n\n` +
              `Closes #${issue.number}\n\n` +
              `---\n` +
              `*Auto-generated from [issue #${issue.number}](${issue.html_url}) via the [mod submission form](https://jakmods.dev/submit.html).*`;

            const { data: pr } = await github.rest.pulls.create({
              ...context.repo,
              title: commitMessage,
              body: prBody,
              head: branchName,
              base: "main"
            });

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: issue.number,
              body: `PR created: #${pr.number}\n\nA maintainer will review and merge it shortly.\n\nThe mod has been added to the **pending preview** list and will be available in the launcher shortly.`
            });

            await github.rest.issues.addLabels({
              ...context.repo,
              issue_number: issue.number,
              labels: ["pr-created"]
            });

            // ── Add to pending_config.yaml on main ──
            const pendingPath = "scripts/update-mod-source-data/pending_config.yaml";
            let pendingContent = 'metadata:\n  name: "PendingJakMods"\nmods: {}\n';
            let pendingSha = null;

            try {
              const { data: pendingFile } = await github.rest.repos.getContent({
                ...context.repo,
                path: pendingPath,
                ref: "main"
              });
              pendingContent = Buffer.from(pendingFile.content, "base64").toString("utf8");
              pendingSha = pendingFile.sha;
            } catch (e) {}

            if (pendingContent.includes("mods: {}")) {
              pendingContent = pendingContent.replace("mods: {}", "mods:\n" + yamlBlock);
            } else {
              pendingContent = pendingContent.trimEnd() + "\n" + yamlBlock;
            }

            const pendingOpts = {
              ...context.repo,
              path: pendingPath,
              message: `pending: Add ${displayName}`,
              content: Buffer.from(pendingContent).toString("base64"),
              branch: "main"
            };
            if (pendingSha) pendingOpts.sha = pendingSha;
            await github.rest.repos.createOrUpdateFileContents(pendingOpts);

      # Now run the real update script against pending_config.yaml
      - name: Pull latest (after pending commit)
        run: git pull --ff-only

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: scripts/update-mod-source-data/package-lock.json

      - name: Install dependencies
        run: cd scripts/update-mod-source-data && npm ci

      - name: Generate pending_mods.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd scripts/update-mod-source-data && npm run update-pending

      - name: Commit pending_mods.json
        uses: EndBug/add-and-commit@v9
        with:
          message: "pending: Update pending_mods.json"
          add: "site/pending_mods.json site/pending_mods_formatted.json"
          push: true
          default_author: github_actions

  # Deploy after submission adds pending mod
  deploy-after-submission:
    name: Deploy site
    needs: handle-issue
    if: >-
      github.event_name == 'issues' &&
      contains(github.event.issue.labels.*.name, 'mod-submission')
    uses: ./.github/workflows/deploy-gh-pages.yaml

  # ── Triggered by PR close (merged OR abandoned) ──────────
  cleanup-pending:
    name: Clean up pending mods
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Remove mod from pending
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Extract mod ID from branch name (e.g. add-mod-my-cool-mod-1234567890)
            const branchMatch = pr.head.ref.match(/^(?:add|update)-mod-(.+)-\d+$/);
            if (!branchMatch) {
              console.log(`Branch "${pr.head.ref}" doesn't match mod submission pattern, skipping.`);
              return;
            }
            const modId = branchMatch[1];
            console.log(`Cleaning up pending entry for mod: ${modId}`);

            const pendingPath = "scripts/update-mod-source-data/pending_config.yaml";

            // Read pending config
            let pendingContent, pendingSha;
            try {
              const { data: pendingFile } = await github.rest.repos.getContent({
                ...context.repo,
                path: pendingPath,
                ref: "main"
              });
              pendingContent = Buffer.from(pendingFile.content, "base64").toString("utf8");
              pendingSha = pendingFile.sha;
            } catch (e) {
              console.log("No pending_config.yaml found, nothing to clean.");
              return;
            }

            // Check if this mod is in pending
            const needle = `\n  ${modId}:\n`;
            const idx = pendingContent.indexOf(needle);
            if (idx === -1) {
              // Also check at start of mods section
              const altNeedle = `mods:\n  ${modId}:\n`;
              if (!pendingContent.includes(altNeedle)) {
                console.log(`Mod ${modId} not found in pending, nothing to remove.`);
                return;
              }
            }

            // Remove the block
            let cleaned = pendingContent;
            const blockNeedle = `\n  ${modId}:\n`;
            const blockIdx = cleaned.indexOf(blockNeedle);
            if (blockIdx !== -1) {
              const blockStart = blockIdx;
              let blockEnd = blockIdx + blockNeedle.length;
              const rest = cleaned.substring(blockEnd).split("\n");
              for (const line of rest) {
                if (line === "" || /^    /.test(line) || /^  #/.test(line)) {
                  blockEnd += line.length + 1;
                } else {
                  break;
                }
              }
              cleaned = cleaned.substring(0, blockStart) + cleaned.substring(blockEnd);
            }

            // Check if any mods remain
            const hasEntries = /^\s{2}[a-z0-9]/m.test(cleaned.split("mods:")[1] || "");
            if (!hasEntries) {
              cleaned = 'metadata:\n  name: "PendingJakMods"\nmods: {}\n';
            }

            // Write cleaned pending_config.yaml
            await github.rest.repos.createOrUpdateFileContents({
              ...context.repo,
              path: pendingPath,
              message: `pending: Remove ${modId}`,
              content: Buffer.from(cleaned).toString("base64"),
              sha: pendingSha,
              branch: "main"
            });

      # Run real update script to regenerate pending_mods.json
      - name: Pull latest (after pending cleanup commit)
        run: git pull --ff-only

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: scripts/update-mod-source-data/package-lock.json

      - name: Install dependencies
        run: cd scripts/update-mod-source-data && npm ci

      - name: Regenerate pending_mods.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd scripts/update-mod-source-data && npm run update-pending

      - name: Commit pending_mods.json
        uses: EndBug/add-and-commit@v9
        with:
          message: "pending: Update pending_mods.json"
          add: "site/pending_mods.json site/pending_mods_formatted.json"
          push: true
          default_author: github_actions

  # Deploy after cleanup
  deploy-after-cleanup:
    name: Deploy site
    needs: cleanup-pending
    uses: ./.github/workflows/deploy-gh-pages.yaml
