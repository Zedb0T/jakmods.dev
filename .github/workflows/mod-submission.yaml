name: Process Mod Issue

on:
  issues:
    types: [opened]
  pull_request:
    types: [closed]
    paths:
      - "scripts/update-mod-source-data/config.yaml"

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write
  pages: write
  id-token: write

jobs:
  # ── Triggered by issue open ──────────────────────────────
  handle-issue:
    name: Handle mod issue
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'issues' && (
        contains(github.event.issue.labels.*.name, 'mod-submission') ||
        contains(github.event.issue.labels.*.name, 'update-source')
      )
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Process issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);

            // ── Route: update-source ──
            if (labels.includes("update-source")) {
              await github.rest.actions.createWorkflowDispatch({
                ...context.repo,
                workflow_id: "update-mod-source.yaml",
                ref: "main"
              });

              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body: "Mod source update triggered! The [Update Mod Source](https://github.com/" +
                  context.repo.owner + "/" + context.repo.repo +
                  "/actions/workflows/update-mod-source.yaml) workflow is now running.\n\n" +
                  "This usually takes a few minutes. The site will redeploy automatically when it finishes."
              });

              await github.rest.issues.update({
                ...context.repo,
                issue_number: issue.number,
                state: "closed",
                state_reason: "completed"
              });
              return;
            }

            // ── Route: mod-submission ──
            const body = issue.body || "";
            const title = issue.title || "";

            const yamlMatch = body.match(/```yaml\n([\s\S]*?)```/);
            if (!yamlMatch) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body: "Could not find a YAML code block in this issue. Please use the [submit form](https://jakmods.dev/submit.html) to generate the correct format."
              });
              return;
            }
            const yamlBlock = yamlMatch[1];

            const modIdMatch = yamlBlock.match(/^\s{2}([a-z0-9][a-z0-9\-]*[a-z0-9]):\s*$/m);
            if (!modIdMatch) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body: "Could not parse a valid mod ID from the YAML block. The entry should start with a 2-space indented kebab-case key like `  my-mod:`."
              });
              return;
            }
            const modId = modIdMatch[1];

            const isUpdate = title.toLowerCase().startsWith("update mod:");

            // Read current config.yaml
            const configPath = "scripts/update-mod-source-data/config.yaml";
            const { data: fileData } = await github.rest.repos.getContent({
              ...context.repo,
              path: configPath,
              ref: "main"
            });
            const currentContent = Buffer.from(fileData.content, "base64").toString("utf8");

            // Build new config content
            let newContent;
            if (isUpdate) {
              const needle = `\n  ${modId}:\n`;
              const idx = currentContent.indexOf(needle);
              if (idx === -1) {
                await github.rest.issues.createComment({
                  ...context.repo,
                  issue_number: issue.number,
                  body: `Could not find existing mod \`${modId}\` in config.yaml. If this is a new mod, change the issue title to start with "Add mod:".`
                });
                return;
              }
              const blockStart = idx + 1;

              let blockEnd = blockStart + needle.length - 1;
              const rest = currentContent.substring(blockEnd).split("\n");
              for (const line of rest) {
                if (line === "" || /^    /.test(line) || /^  #/.test(line)) {
                  blockEnd += line.length + 1;
                } else {
                  break;
                }
              }

              newContent = currentContent.substring(0, blockStart) + yamlBlock + currentContent.substring(blockEnd);
            } else {
              if (currentContent.includes(`\n  ${modId}:\n`)) {
                await github.rest.issues.createComment({
                  ...context.repo,
                  issue_number: issue.number,
                  body: `Mod ID \`${modId}\` already exists in config.yaml. If you want to update it, change the issue title to start with "Update mod:".`
                });
                return;
              }

              const texIdx = currentContent.indexOf("\ntexture_packs:");
              if (texIdx !== -1) {
                newContent = currentContent.substring(0, texIdx) + "\n" + yamlBlock + currentContent.substring(texIdx);
              } else {
                newContent = currentContent + "\n" + yamlBlock;
              }
            }

            // Create branch
            const action = isUpdate ? "update" : "add";
            const branchName = `${action}-mod-${modId}-${Date.now()}`;

            const { data: mainRef } = await github.rest.git.getRef({
              ...context.repo,
              ref: "heads/main"
            });

            await github.rest.git.createRef({
              ...context.repo,
              ref: `refs/heads/${branchName}`,
              sha: mainRef.object.sha
            });

            // Commit config change to branch
            const displayName = title.replace(/^(add|update)\s+mod:\s*/i, "").trim();
            const commitMessage = isUpdate
              ? `Update mod: ${displayName}`
              : `Add mod: ${displayName}`;

            await github.rest.repos.createOrUpdateFileContents({
              ...context.repo,
              path: configPath,
              message: commitMessage,
              content: Buffer.from(newContent).toString("base64"),
              sha: fileData.sha,
              branch: branchName
            });

            // Create PR
            const prBody = `${isUpdate ? "Updates" : "Adds"} the **${displayName}** mod entry in \`config.yaml\`.\n\n` +
              `Closes #${issue.number}\n\n` +
              `---\n` +
              `*Auto-generated from [issue #${issue.number}](${issue.html_url}) via the [mod submission form](https://jakmods.dev/submit.html).*`;

            const { data: pr } = await github.rest.pulls.create({
              ...context.repo,
              title: commitMessage,
              body: prBody,
              head: branchName,
              base: "main"
            });

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: issue.number,
              body: `PR created: #${pr.number}\n\nA maintainer will review and merge it shortly.\n\nThe mod has also been added to the **pending preview** list so it can be previewed in the launcher.`
            });

            await github.rest.issues.addLabels({
              ...context.repo,
              issue_number: issue.number,
              labels: ["pr-created"]
            });

            // ── Add to pending_config.yaml on main ──
            const pendingPath = "scripts/update-mod-source-data/pending_config.yaml";
            let pendingContent = 'metadata:\n  name: "PendingJakMods"\nmods: {}\n';
            let pendingSha = null;

            try {
              const { data: pendingFile } = await github.rest.repos.getContent({
                ...context.repo,
                path: pendingPath,
                ref: "main"
              });
              pendingContent = Buffer.from(pendingFile.content, "base64").toString("utf8");
              pendingSha = pendingFile.sha;
            } catch (e) {
              // File doesn't exist yet, use default
            }

            // Append the mod entry before the closing of mods section
            // If mods is empty `{}`, replace it
            if (pendingContent.includes("mods: {}")) {
              pendingContent = pendingContent.replace("mods: {}", "mods:\n" + yamlBlock);
            } else {
              // Append to end
              pendingContent = pendingContent.trimEnd() + "\n" + yamlBlock;
            }

            const pendingCommitOpts = {
              ...context.repo,
              path: pendingPath,
              message: `pending: Add ${displayName}`,
              content: Buffer.from(pendingContent).toString("base64"),
              branch: "main"
            };
            if (pendingSha) pendingCommitOpts.sha = pendingSha;

            await github.rest.repos.createOrUpdateFileContents(pendingCommitOpts);

            // ── Generate pending_mods.json on main ──
            // Re-read the pending config we just wrote (need fresh SHA)
            const { data: freshPending } = await github.rest.repos.getContent({
              ...context.repo,
              path: pendingPath,
              ref: "main"
            });
            const freshPendingContent = Buffer.from(freshPending.content, "base64").toString("utf8");

            // Parse YAML manually (simple key-value extraction for each mod)
            const pendingJson = { schemaVersion: "1.0.0", sourceName: "PendingJakMods", mods: {} };
            const modBlocks = freshPendingContent.split(/\n  (?=[a-z0-9])/);
            for (const block of modBlocks) {
              const idMatch = block.match(/^([a-z0-9][a-z0-9\-]*[a-z0-9]):\s*$/m);
              if (!idMatch) continue;
              const id = idMatch[1];
              const get = (key) => {
                const m = block.match(new RegExp(`${key}:\\s*"([^"]*)"`, "m"));
                return m ? m[1] : null;
              };
              const getList = (key) => {
                const m = block.match(new RegExp(`${key}:\\s*\\[([^\\]]*)]`, "m"));
                return m ? m[1].split(",").map(s => s.trim().replace(/^"|"$/g, "")).filter(Boolean) : [];
              };

              pendingJson.mods[id] = {
                displayName: get("display_name") || id,
                description: get("description") || "",
                authors: getList("authors"),
                tags: getList("tags"),
                coverArtUrl: get("cover_art_url") || null,
                thumbnailArtUrl: get("thumbnail_art_url") || null,
                repoOwner: get("repo_owner") || null,
                repoName: get("repo_name") || null,
                websiteUrl: get("website_url") || null,
                externalLink: get("external_link") || null,
                supportedGames: getList("supported_games"),
                versions: [],
                perGameConfig: {}
              };
            }

            // Write pending_mods.json
            const jsonPath = "site/pending_mods.json";
            let jsonSha = null;
            try {
              const { data: jsonFile } = await github.rest.repos.getContent({
                ...context.repo,
                path: jsonPath,
                ref: "main"
              });
              jsonSha = jsonFile.sha;
            } catch (e) {}

            const jsonOpts = {
              ...context.repo,
              path: jsonPath,
              message: `pending: Update pending_mods.json`,
              content: Buffer.from(JSON.stringify(pendingJson, null, 2)).toString("base64"),
              branch: "main"
            };
            if (jsonSha) jsonOpts.sha = jsonSha;

            await github.rest.repos.createOrUpdateFileContents(jsonOpts);

  # Deploy site after pending update
  deploy-after-submission:
    name: Deploy site
    needs: handle-issue
    if: >-
      github.event_name == 'issues' &&
      contains(github.event.issue.labels.*.name, 'mod-submission')
    uses: ./.github/workflows/deploy-gh-pages.yaml

  # ── Triggered by PR merge: clean up pending ──────────────
  cleanup-pending:
    name: Clean up pending mods
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Remove merged mods from pending
        uses: actions/github-script@v7
        with:
          script: |
            const pendingPath = "scripts/update-mod-source-data/pending_config.yaml";
            const configPath = "scripts/update-mod-source-data/config.yaml";

            // Read both files
            let pendingContent, pendingSha;
            try {
              const { data: pendingFile } = await github.rest.repos.getContent({
                ...context.repo,
                path: pendingPath,
                ref: "main"
              });
              pendingContent = Buffer.from(pendingFile.content, "base64").toString("utf8");
              pendingSha = pendingFile.sha;
            } catch (e) {
              console.log("No pending_config.yaml found, nothing to clean.");
              return;
            }

            // If pending is empty, nothing to do
            if (pendingContent.includes("mods: {}") || !pendingContent.match(/^\s{2}[a-z]/m)) {
              console.log("No pending mods to clean.");
              return;
            }

            const { data: configFile } = await github.rest.repos.getContent({
              ...context.repo,
              path: configPath,
              ref: "main"
            });
            const configContent = Buffer.from(configFile.content, "base64").toString("utf8");

            // Find all mod IDs in pending
            const pendingIds = [...pendingContent.matchAll(/^\s{2}([a-z0-9][a-z0-9\-]*[a-z0-9]):\s*$/gm)]
              .map(m => m[1]);

            // Remove any that now exist in config.yaml
            let cleaned = pendingContent;
            let removedAny = false;
            for (const id of pendingIds) {
              if (configContent.includes(`\n  ${id}:\n`) || configContent.includes(`\nmods:\n  ${id}:\n`)) {
                // Remove this block from pending
                const needle = `\n  ${id}:\n`;
                const idx = cleaned.indexOf(needle);
                if (idx === -1) continue;
                const blockStart = idx;

                let blockEnd = idx + needle.length;
                const rest = cleaned.substring(blockEnd).split("\n");
                for (const line of rest) {
                  if (line === "" || /^    /.test(line) || /^  #/.test(line)) {
                    blockEnd += line.length + 1;
                  } else {
                    break;
                  }
                }

                cleaned = cleaned.substring(0, blockStart) + cleaned.substring(blockEnd);
                removedAny = true;
                console.log(`Removed ${id} from pending (now in config.yaml)`);
              }
            }

            if (!removedAny) {
              console.log("No pending mods were merged, nothing to clean.");
              return;
            }

            // If no mods remain, reset to empty
            const remainingIds = [...cleaned.matchAll(/^\s{2}([a-z0-9][a-z0-9\-]*[a-z0-9]):\s*$/gm)];
            if (remainingIds.length === 0) {
              cleaned = 'metadata:\n  name: "PendingJakMods"\nmods: {}\n';
            }

            // Write cleaned pending_config.yaml
            await github.rest.repos.createOrUpdateFileContents({
              ...context.repo,
              path: pendingPath,
              message: "pending: Remove merged mods",
              content: Buffer.from(cleaned).toString("base64"),
              sha: pendingSha,
              branch: "main"
            });

            // Regenerate pending_mods.json
            const pendingJson = { schemaVersion: "1.0.0", sourceName: "PendingJakMods", mods: {} };
            if (remainingIds.length > 0) {
              const modBlocks = cleaned.split(/\n  (?=[a-z0-9])/);
              for (const block of modBlocks) {
                const idMatch = block.match(/^([a-z0-9][a-z0-9\-]*[a-z0-9]):\s*$/m);
                if (!idMatch) continue;
                const id = idMatch[1];
                const get = (key) => {
                  const m = block.match(new RegExp(`${key}:\\s*"([^"]*)"`, "m"));
                  return m ? m[1] : null;
                };
                const getList = (key) => {
                  const m = block.match(new RegExp(`${key}:\\s*\\[([^\\]]*)]`, "m"));
                  return m ? m[1].split(",").map(s => s.trim().replace(/^"|"$/g, "")).filter(Boolean) : [];
                };

                pendingJson.mods[id] = {
                  displayName: get("display_name") || id,
                  description: get("description") || "",
                  authors: getList("authors"),
                  tags: getList("tags"),
                  coverArtUrl: get("cover_art_url") || null,
                  thumbnailArtUrl: get("thumbnail_art_url") || null,
                  repoOwner: get("repo_owner") || null,
                  repoName: get("repo_name") || null,
                  websiteUrl: get("website_url") || null,
                  externalLink: get("external_link") || null,
                  supportedGames: getList("supported_games"),
                  versions: [],
                  perGameConfig: {}
                };
              }
            }

            const jsonPath = "site/pending_mods.json";
            const { data: jsonFile } = await github.rest.repos.getContent({
              ...context.repo,
              path: jsonPath,
              ref: "main"
            });

            await github.rest.repos.createOrUpdateFileContents({
              ...context.repo,
              path: jsonPath,
              message: "pending: Update pending_mods.json",
              content: Buffer.from(JSON.stringify(pendingJson, null, 2)).toString("base64"),
              sha: jsonFile.sha,
              branch: "main"
            });

  # Deploy site after pending cleanup
  deploy-after-cleanup:
    name: Deploy site
    needs: cleanup-pending
    uses: ./.github/workflows/deploy-gh-pages.yaml
